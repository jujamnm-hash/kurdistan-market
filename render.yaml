services:
  - type: web
    name: kurdistan-market-backend
    runtime: node
    rootDir: functions
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        sync: false       # Set manually in Render dashboard
      - key: FRONTEND_URL
        sync: false       # Set to Firebase Hosting URL after deploy
      - key: FIREBASE_SERVICE_ACCOUNT
        sync: false       # Paste service account JSON string here
    healthCheckPath: /api/health
