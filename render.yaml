services:
  - type: web
    name: kurdistan-market-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: MONGO_URI
        sync: false       # Set manually in Render dashboard
      - key: JWT_SECRET
        sync: false       # Set manually in Render dashboard
      - key: JWT_EXPIRE
        value: 7d
      - key: FRONTEND_URL
        sync: false       # Set manually after Netlify deploy
    healthCheckPath: /api/health
